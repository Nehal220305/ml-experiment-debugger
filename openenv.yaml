name: ml_experiment_debugger
version: "2.0.0"
description: >
  An RL environment where an AI agent debugs broken ML training experiments.
  The agent receives a faulty training config and real PyTorch training log,
  identifies the bug, and proposes a fix. Six tasks of increasing difficulty
  covering exploding loss, data leakage, label noise, wrong loss function,
  vanishing gradients, and missing normalization.
author: "Nehal Gupta, Raman Asolekar"
license: "BSD-3-Clause"
tags:
  - machine-learning
  - debugging
  - reinforcement-learning
  - openenv
  - pytorch
  - gradient-debugging
  - ml-debugging
tasks:
  - id: easy
    name: "Exploding Loss"
    description: "Learning rate is too high — real gradient explosion via PyTorch."
    difficulty: easy
  - id: medium
    name: "Data Leakage"
    description: "Validation set is same as training set — accuracy misleadingly perfect."
    difficulty: medium
  - id: hard
    name: "Silent Label Noise"
    description: "30% labels flipped + bad LR — model appears fine but fails on real data."
    difficulty: hard
  - id: very_hard
    name: "Wrong Loss Function"
    description: "MSE loss for classification — accuracy plateaus near 52% despite converging loss."
    difficulty: very_hard
  - id: expert_1
    name: "Vanishing Gradients"
    description: "Deep network with sigmoid activations — gradients vanish, loss stalls."
    difficulty: expert
  - id: expert_2
    name: "Missing Normalization"
    description: "Unnormalized inputs (values >1000) cause wildly oscillating loss."
    difficulty: expert
action_space:
  type: object
  fields:
    action_type:
      type: string
      description: "One of: identify_bug, fix_config, submit_fix"
    bug_identified:
      type: string
      description: "One of: learning_rate_too_high, data_leakage, label_noise, wrong_loss_function, vanishing_gradients, missing_normalization"
      optional: true
    config_changes:
      type: object
      description: "Key-value config fixes to apply"
      optional: true
    explanation:
      type: string
      description: "Agent's reasoning for partial credit"
      optional: true
observation_space:
  type: object
  fields:
    task_id:
      type: string
      description: "Active task: easy, medium, hard, very_hard, expert_1, expert_2"
    training_log:
      type: array
      description: "Real PyTorch training output showing loss, accuracy, gradient norms"
    current_config:
      type: object
      description: "The broken config the agent must fix"
    hint:
      type: string
      description: "Optional hint shown after wrong attempts"
      optional: true
    message:
      type: string
      description: "Feedback after each action"
    reward:
      type: float
      description: "Partial credit score 0.0-1.0"
      optional: true
    done:
      type: boolean
      description: "True when episode is complete"
reward:
  min: 0.0
  max: 1.0
  description: >
    +0.3 for correctly identifying the bug type.
    +0.7 for a fix that makes training converge successfully.
    +0.35 for partial fix. Partial credit given at each step.
server:
  port: 7860
  framework: fastapi
  endpoints:
    - /reset
    - /step
    - /state
    - /health
    - /baseline
    - /grader
    - /tasks
    - /schema